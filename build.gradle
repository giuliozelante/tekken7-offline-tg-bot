plugins {
    id("com.github.johnrengelman.shadow") version "7.1.2"
    id("io.micronaut.application") version "3.4.1"
    id 'java'
}

version = "0.1"
group = "it.giuliozelante.tekken7.offline.tg.bot"

repositories {
    mavenCentral()
}

dependencies {
    annotationProcessor("org.projectlombok:lombok")
    annotationProcessor("io.micronaut.data:micronaut-data-processor")
    annotationProcessor("io.micronaut:micronaut-http-validation")
    implementation("io.micronaut:micronaut-http-client")
    implementation("io.micronaut:micronaut-jackson-databind")
    implementation("io.micronaut.beanvalidation:micronaut-hibernate-validator")
    implementation("io.micronaut.data:micronaut-data-hibernate-jpa")
    implementation("io.micronaut.sql:micronaut-jdbc-hikari")
    implementation("jakarta.annotation:jakarta.annotation-api")
    implementation("org.apache.logging.log4j:log4j-core:2.17.2")
    compileOnly("org.projectlombok:lombok")
    compileOnly("jakarta.persistence:jakarta.persistence-api:2.2.3")
    runtimeOnly("com.h2database:h2-mvstore:2.1.212")
    runtimeOnly("org.apache.logging.log4j:log4j-api:2.17.2")
    runtimeOnly("org.apache.logging.log4j:log4j-slf4j-impl:2.17.2")
    implementation("io.micronaut:micronaut-validation")
    implementation 'org.telegram:telegrambots:6.0.1'
}


application {
    mainClass.set("it.giuliozelante.tekken7.offline.tg.bot.App")
}
java {
    sourceCompatibility = JavaVersion.toVersion("17")
    targetCompatibility = JavaVersion.toVersion("17")
}

graalvmNative.toolchainDetection = false
micronaut {
    version micronautVersion
    runtime("netty")
    // testRuntime("junit5")
    processing {
        incremental(true)
        annotations("it.giuliozelante.tekken7.offline.tg.bot.*")
    }
}



