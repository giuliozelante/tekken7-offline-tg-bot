plugins {
    id 'com.github.johnrengelman.shadow' version '8.1.1'
    id 'io.micronaut.application' version '4.3.7'
    id 'io.micronaut.aot' version '4.3.7'
    id 'com.github.ben-manes.versions' version '0.51.0'
    id 'fr.brouillard.oss.gradle.jgitver' version '0.10.0-rc03'
}

group = 'it.giuliozelante.tekken7.offline.tg.bot'

repositories {
    mavenCentral()
}

dependencies {
    annotationProcessor 'org.projectlombok:lombok',
        'io.micronaut:micronaut-http-validation',
        'io.micronaut.serde:micronaut-serde-processor'
    implementation 'io.micronaut:micronaut-http-client',
            'io.micronaut.data:micronaut-data-tx-hibernate',
            'io.micronaut.serde:micronaut-serde-jackson',
            'io.micronaut.sql:micronaut-hibernate-jpa',
            'io.micronaut.sql:micronaut-jdbc-hikari',
            'org.telegram:telegrambots:6.9.7.1',
            'p6spy:p6spy:3.9.1'
    compileOnly 'org.projectlombok:lombok'
    runtimeOnly 'ch.qos.logback:logback-classic',
            'com.h2database:h2',
            'org.yaml:snakeyaml:2.2'
}

application {
    mainClass.set('it.giuliozelante.tekken7.offline.tg.bot.App')
}

java {
    sourceCompatibility = JavaVersion.toVersion("21")
    targetCompatibility = JavaVersion.toVersion("21")
}

// Disable GraalVM Native Image's automatic toolchain detection
graalvmNative.toolchainDetection = false
micronaut {
    ignoredAutomaticDependencies.add("io.micronaut.data:micronaut-data-processor")
    processing {
        incremental(true)
        annotations('it.giuliozelante.tekken7.offline.tg.bot.*')
    }
    aot {
        optimizeServiceLoading = false
        convertYamlToJava = false
        precomputeOperations = true
        cacheEnvironment = true
        optimizeClassLoading = true
        deduceEnvironment = true
    }
}

tasks.named("dockerfileNative") {
    jdkVersion = "22"
}
